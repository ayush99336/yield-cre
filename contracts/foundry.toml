[profile.default]
src = "src"
out = "out"
libs = ["lib", "../node_modules"]
test = "test"
script = "script"
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
ffi = true
fs_permissions = [{ access = "read-write", path = "./" }]

[fmt]
line_length = 100

[rpc_endpoints]
world_sepolia = "${WORLD_SEPOLIA_RPC_URL}"
eth_sepolia = "${ETH_SEPOLIA_RPC_URL}"
polygon_amoy = "${POLYGON_AMOY_RPC_URL}"
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"
